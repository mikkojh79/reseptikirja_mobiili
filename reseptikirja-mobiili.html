<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Reseptikirja">
<title>Reseptikirja</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --green: #1D9E75;
  --green-light: #e8f7f1;
  --green-mid: #0f7a59;
  --bg: #f7f7f9;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.07);
  --text: #111111;
  --text-secondary: #888896;
  --text-tertiary: #b0b0bc;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 24px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f10;
    --surface: #1a1a1c;
    --border: rgba(255,255,255,0.07);
    --text: #f2f2f7;
    --text-secondary: #8e8e93;
    --text-tertiary: #48484a;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.2);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
  }
  .search-input { background: rgba(255,255,255,0.06) !important; color: var(--text) !important; }
  .filter-chip { background: rgba(255,255,255,0.06) !important; color: var(--text-secondary) !important; border-color: transparent !important; }
  .meta-item { background: rgba(255,255,255,0.06) !important; }
  .card-tag { background: rgba(255,255,255,0.06) !important; color: var(--text-secondary) !important; }
  .card-tag.cat { background: rgba(29,158,117,0.15) !important; color: #4cd9a0 !important; }
  .shop-sheet { background: #1a1a1c !important; }
  .setup-input { background: rgba(255,255,255,0.06) !important; color: var(--text) !important; border-color: rgba(255,255,255,0.08) !important; }
  .ing-check { border-color: #3a3a3c !important; }
  .shop-check { border-color: #3a3a3c !important; }
  .close-sheet { background: rgba(255,255,255,0.08) !important; color: var(--text-secondary) !important; }
  .ingredient-row, .step-row, .shop-item { border-color: rgba(255,255,255,0.06) !important; }
  .section-heading { border-color: rgba(255,255,255,0.06) !important; }
  .source-link { background: rgba(255,255,255,0.06) !important; color: var(--text) !important; }
  .sort-btn { background: rgba(255,255,255,0.06) !important; color: var(--text-secondary) !important; }
  .sort-btn.active { background: rgba(29,158,117,0.15) !important; color: #4cd9a0 !important; }
  .setup-view { background: var(--bg) !important; }
  .filter-chip.active { background: var(--green) !important; color: #fff !important; }
  .step-text { color: var(--text) !important; }
  .header { border-color: rgba(255,255,255,0.06) !important; }
  .search-bar { border-color: rgba(255,255,255,0.06) !important; }
  .filter-scroll { border-color: rgba(255,255,255,0.06) !important; }
  .bottom-nav { border-color: rgba(255,255,255,0.06) !important; }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}

.phone-frame { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
.header {
  background: var(--surface);
  padding: 52px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 22px; font-weight: 700; flex: 1; letter-spacing: -0.3px; }
.header-btn {
  background: var(--bg);
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 17px;
  padding: 0;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s;
}
.header-btn:active { opacity: 0.6; }

/* ── SEARCH & SORT ── */
.search-bar {
  background: var(--surface);
  padding: 10px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-input {
  flex: 1;
  background: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 15px;
  color: var(--text);
  outline: none;
  font-family: inherit;
}
.search-input::placeholder { color: var(--text-tertiary); }
.sort-btn {
  background: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 600;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
  letter-spacing: -0.1px;
}
.sort-btn.active { background: var(--green-light); color: var(--green); }

/* ── FILTER CHIPS ── */
.filter-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
  background: var(--bg);
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  color: var(--text-secondary);
  flex-shrink: 0;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.filter-chip.active { background: var(--green); color: #fff; }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 14px 16px 24px; }

/* ── RECIPE CARD ── */
.recipe-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.12s, box-shadow 0.12s;
}
.recipe-card:active { transform: scale(0.985); box-shadow: none; }
.card-image-wrap {
  width: 100%;
  height: 170px;
  overflow: hidden;
  background: var(--bg);
}
.card-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-body { padding: 14px 16px 16px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-name { font-size: 16px; font-weight: 650; line-height: 1.25; flex: 1; letter-spacing: -0.2px; }
.card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.card-tag {
  font-size: 12px;
  background: var(--bg);
  border-radius: 6px;
  padding: 3px 8px;
  color: var(--text-secondary);
  font-weight: 500;
}
.card-tag.cat { background: var(--green-light); color: var(--green-mid); }
.card-time {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 3px;
  font-weight: 500;
}
.card-servings { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }

/* ── EMPTY / LOADING ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-secondary); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 20px; gap: 14px; color: var(--text-secondary); font-size: 14px; }
.spinner { width: 26px; height: 26px; border: 2.5px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 0 30px;
  position: sticky;
  bottom: 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 4px 6px;
  cursor: pointer;
  border: none;
  background: none;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-tertiary);
  font-family: inherit;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--green); }
.nav-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-icon svg { width: 22px; height: 22px; }

/* ── FAV BUTTON ── */
.fav-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
.fav-btn svg { width: 22px; height: 22px; }
.fav-btn.active svg { fill: #ff9500; stroke: #ff9500; }
.fav-btn:not(.active) svg { fill: none; stroke: var(--text-tertiary); }

/* ── DETAIL VIEW ── */
.detail-view {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  overflow-y: auto;
  max-width: 430px;
  margin: 0 auto;
}
.detail-hero {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
  background: var(--bg);
}
.detail-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 52px 16px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.detail-header-floating {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: flex-start;
  padding: 52px 16px 14px;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, transparent 100%);
}
.back-btn {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: none;
  border-radius: 20px;
  padding: 7px 14px 7px 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: inherit;
}
.back-btn-plain {
  background: none;
  border: none;
  font-size: 17px;
  cursor: pointer;
  color: var(--green);
  padding: 4px;
  font-weight: 600;
  font-family: inherit;
}
.detail-title-area { padding: 18px 16px 4px; }
.detail-title { font-size: 24px; font-weight: 700; line-height: 1.2; letter-spacing: -0.4px; }
.detail-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

.detail-body { padding: 16px; }

.detail-meta { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.meta-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  flex: 1;
  min-width: 70px;
  box-shadow: var(--shadow-sm);
}
.meta-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; font-weight: 500; }
.meta-val { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }

.source-link {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 20px;
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  box-shadow: var(--shadow-sm);
}
.source-link span:last-child { color: var(--green); font-weight: 600; }

.section-heading {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 10px;
  margin-top: 24px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.ingredient-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.ing-check {
  width: 24px;
  height: 24px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  transition: background 0.15s, border-color 0.15s;
}
.ing-check.checked { background: var(--green); border-color: var(--green); color: #fff; font-size: 13px; }
.ing-text { font-size: 15px; flex: 1; line-height: 1.4; }
.ing-text.checked { text-decoration: line-through; color: var(--text-tertiary); }

.step-row {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.step-num {
  width: 28px;
  height: 28px;
  background: var(--green);
  color: #fff;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}
.step-text { font-size: 15px; line-height: 1.6; flex: 1; color: var(--text); }

/* ── SHOP OVERLAY ── */
.shop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; flex-direction: column; justify-content: flex-end; max-width: 430px; margin: 0 auto; }
.shop-sheet { background: var(--surface); border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 20px 16px 48px; max-height: 80vh; overflow-y: auto; position: relative; }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.2px; }
.shop-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.shop-check { width: 26px; height: 26px; border: 1.5px solid var(--border); border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.shop-check.checked { background: var(--green); border-color: var(--green); color: #fff; font-size: 14px; }
.shop-text { font-size: 15px; flex: 1; }
.shop-text.checked { text-decoration: line-through; color: var(--text-tertiary); }
.close-sheet { position: absolute; top: 20px; right: 16px; background: var(--bg); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; }

/* ── SETUP VIEW ── */
.setup-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 32px 24px; text-align: center; gap: 16px; background: var(--bg); }
.setup-icon { font-size: 56px; }
.setup-title { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
.setup-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.setup-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 14px; background: var(--surface); color: var(--text); outline: none; font-family: inherit; box-shadow: var(--shadow-sm); }
.setup-input:focus { border-color: var(--green); }
.setup-btn { background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); padding: 15px 28px; font-size: 17px; font-weight: 700; cursor: pointer; width: 100%; font-family: inherit; letter-spacing: -0.2px; }
.error-msg { font-size: 13px; color: #ff3b30; }

.favorites-empty { text-align: center; padding: 48px 20px; color: var(--text-secondary); font-size: 14px; line-height: 1.7; }
.shop-btn {
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
  flex-shrink: 0;
  font-family: inherit;
}
</tyle>
</head>
<body>
<div class="phone-frame" id="app">

<div class="header">
  <button id="setup-back-btn" onclick="closeSetup()" style="display:none;background:none;border:none;font-size:17px;color:var(--green);font-weight:600;cursor:pointer;padding:4px;font-family:inherit;">‹ Takaisin</button>
  <span id="header-icon" style="font-size:24px;">🍵️</span>
  <h1 id="header-title">Reseptikirja</h1>
  <button class="header-btn" onclick="loadRecipes()" title="Päivitä">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5"/></svg>
  </button>
  <button class="header-btn" onclick="showSetup()" title="Asetukset">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<div id="main-content">
  <div class="setup-view" id="setup-view7" style="display:none;">
    <div class="setup-icon">🔗</div>
    <div class="setup-title">Yhdistä reseptikirja</div>
    <div class="setup-desc">Liitä Google Sheets Apps Script -osoitteesi alle.</div>
    <input class="setup-input" id="api-url-input" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
    <div class="error-msg" id="setup-error" style="display:none;"></div>
    <button class="setup-btn" onclick="saveApiUrl()">Yhdistä</button>
  </div>

  <div id="browse-view">
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="Hae reseptiä..." oninput="renderList()" />
      <button class="sort-btn" id="sort-btn" onclick="toggleSort()" title="Vaihda järjestys">A–Z</button>
    </div>
    <div class="filter-scroll" id="filter-chips"></div>
    <div class="content" id="recipe-list"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-browse" onclick="setTab('browse')">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8h20M2 12h20M2 16h12"/>
        <rect x="2" y="3" width="20" height="18" rx="3"/>
      </svg>
    </span>
    Reseptit
  </button>
  <button class="nav-btn" id="nav-favorites" onclick="setTab('favorites')">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </span>
    Suosikit
  </button>
  <button class="nav-btn" id="nav-shopping" onclick="setTab('shopping')">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
    </span>
    Ostoslista
  </button>
</div>
</div>

<div class="detail-view" id="detail-view" style="display:none;"></div>
<div class="shop-overlay" id="shop-overlay" style="display:none;"></div>

<script>
let recipes = [];
let favorites = new Set(JSON.parse(localStorage.getItem('rk_favs') || '[]'));
let activeCategory = 'all';
let activeTab = 'browse';
let apiUrl = localStorage.getItem('rk_api_url') || '';
let sortOrder = localStorage.getItem('rk_sort') || 'alpha';

function updateSortBtn() {
  const btn = document.getElementById('sort-btn');
  if (!btn) return;
  if (sortOrder === 'alpha') {
    btn.textContent = 'A–Z';
    btn.classList.remove('active');
  } else {
    btn.textContent = 'Uusin';
    btn.classList.add('active');
  }
}

function toggleSort() {
  sortOrder = sortOrder === 'alpha' ? 'newest' : 'alpha';
  localStorage.setItem('rk_sort', sortOrder);
  updateSortBtn();
  renderList();
}

function init() {
  if (!apiUrl) { showSetup(); return; }
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('browse-view').style.display = 'block';
  updateSortBtn();
  const cached = localStorage.getItem('rk_recipes');
  if (cached) {
    recipes = JSON.parse(cached);
    renderFilters();
    renderList();
  } else {
    loadRecipes();
  }
}

function closeSetup() {
  if (!apiUrl) return;
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('browse-view').style.display = 'block';
  document.getElementById('header-title').textContent = 'Reseptikirja';
  document.querySelector('.bottom-nav').style.visibility = 'visible';
  document.getElementById('setup-back-btn').style.display = 'none';
  document.getElementById('header-icon').style.display = 'block';
}

function showSetup() {
  document.getElementById('setup-view').style.display = 'flex';
  document.getElementById('browse-view').style.display = 'none';
  document.getElementById('api-url-input').value = apiUrl;
  document.getElementById('setup-error').style.display = 'none';
  document.getElementById('header-title').textContent = 'Asetukset';
  document.querySelector('.bottom-nav').style.visibility = 'hidden';
  const backBtn = document.getElementById('setup-back-btn');
  const headerIcon = document.getElementById('header-icon');
  if (backBtn) backBtn.style.display = apiUrl ? 'block' : 'none';
  if (headerIcon) headerIcon.style.display = apiUrl ? 'none' : 'block';
}

function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim();
  if (!val.startsWith('https://')) {
    document.getElementById('setup-error').textContent = 'Tarkista URL-osoite.';
    document.getElementById('setup-error').style.display = 'block';
    return;
  }
  apiUrl = val;
  localStorage.setItem('rk_api_url', apiUrl);
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('browse-view').style.display = 'block';
  document.getElementById('header-title').textContent = 'Reseptikirja';
  document.querySelector('.bottom-nav').style.visibility = 'visible';
  loadRecipes();
}

async function loadRecipes() {
  document.getElementById('recipe-list').innerHTML = '<div class="loading"><div class="spinner"></div>Ladataan reseptejä...</div>';
  document.getElementById('filter-chips').innerHTML = '';
  try {
    const res = await fetch(apiUrl);
    const data = await res.json();
    recipes = (Array.isArray(data) ? data : []).map(r => ({
      ...r,
      ingredients: parse(r.ingredients, []),
      steps: parse(r.steps, []),
      tags: parse(r.tags, []),
    }));
    localStorage.setItem('rk_recipes', JSON.stringify(recipes));
    renderFilters();
    renderList();
  } catch(e) {
    document.getElementById('recipe-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Yhteysvirhe</div><p style="font-size:13px;color:var(--text-secondary);margin-top:6px;">Tarkista API-osoite asetuksista.</p></div>';
  }
}

function parse(val, def) {
  if (!val) return def;
  if (typeof val === 'object') return val;
  try { return JSON.parse(val); } catch(e) {}
  if (def && Array.isArray(def)) {
    const text = String(val).trim();
    if (!text) return def;
    const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
    if (lines.length > 1) return lines.map(l => ({ name: l, text: l }));
    const numbered = text.split(/(?=\d+\.\s)/).map(s => s.trim()).filter(Boolean);
    if (numbered.length > 1) return numbered.map(s => ({ text: s.replace(/^\d+\.\s*/, ''), name: s.replace(/^\d+\.\s*/, '') }));
    const parts = text.split(/(?=\d+\.?\d*\s*(g|kg|ml|l|dl|kpl|large|small|medium|tbsp|tsp|cup)\b)/i).map(s => s.trim()).filter(Boolean);
    if (parts.length > 1) return parts.map(p => ({ name: p, text: p }));
    return [{ name: text, text: text }];
  }
  return def;
}

function renderFilters() {
  const cats = [...new Set(recipes.map(r => r.category).filter(Boolean))].sort();
  document.getElementById('filter-chips').innerHTML =
    `<button class="filter-chip active" data-cat="all" onclick="setCat('all')">Kaikki</button>` +
    cats.map(c => `<button class="filter-chip" data-cat="${c}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-chip').forEach(el =>
    el.classList.toggle('active', el.dataset.cat === cat));
  renderList();
}

function getFiltered() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  let list = activeTab === 'favorites' ? recipes.filter(r => favorites.has(String(r.id))) : recipes;
  if (activeCategory !== 'all') list = list.filter(r => r.category === activeCategory);
  if (q) list = list.filter(r =>
    (r.name||'').toLowerCase().includes(q) ||
    (Array.isArray(r.ingredients) ? r.ingredients.map(i=>i.name||i).join(' ') : '').toLowerCase().includes(q) ||
    (r.category||'').toLowerCase().includes(q) ||
    (Array.isArray(r.tags) ? r.tags.join(' ') : '').toLowerCase().includes(q)
  );
  if (sortOrder === 'alpha') {
    list = [...list].sort((a, b) => (a.name||'').localeCompare(b.name||'', 'fi'));
  } else {
    list = [...list].sort((a, b) => Number(b.id) - Number(a.id));
  }
  return list;
}

const favSvg = (active) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22" style="${active?'fill:#ff9500;stroke:#ff9500':'stroke:#c7c7cc'}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

function renderList() {
  const list = getFiltered();
  const el = document.getElementById('recipe-list');
  if (!list.length) {
    if (activeTab === 'favorites' && !recipes.filter(r=>favorites.has(String(r.id))).length) {
      el.innerHTML = '<div class="favorites-empty">Ei suosikkeja vielä.<br><br>Avaa resepti ja napauta ★ lisätäksesi suosikkeihin.</div>';
    } else {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Ei tuloksia</div></div>';
    }
    return;
  }
  el.innerHTML = list.map(r => {
    const isFav = favorites.has(String(r.id));
    const tags = Array.isArray(r.tags) ? r.tags.slice(0,2).map(t=>`<span class="card-tag">${t}</span>`).join('') : '';
    const timeTag = r.time ? `<span class="card-time"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${r.time}</span>` : '';
    return `<div class="recipe-card" onclick="openDetail('${r.id}')">
      ${r.image?`<div class="card-image-wrap"><img src="${r.image}" alt="${r.name||''}" onerror="this.parentElement.style.display='none'" /></div>`:''}
      <div class="card-body">
        <div class="card-header">
          <div class="card-name">${r.name||'Nimetön'}</div>
          <button class="fav-btn ${isFav?'active':''}" onclick="event.stopPropagation();toggleFav('${r.id}')">${favSvg(isFav)}</button>
        </div>
        <div class="card-meta">
          ${r.category?`<span class="card-tag cat">${r.category}</span>`:''}
          ${timeTag}
          ${tags}
        </div>
        ${r.servings?`<div class="card-servings">${r.servings} annosta</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleFav(id) {
  const key = String(id);
  if (favorites.has(key)) favorites.delete(key); else favorites.add(key);
  localStorage.setItem('rk_favs', JSON.stringify([...favorites]));
  renderList();
}

function openDetail(id) {
  const r = recipes.find(x => String(x.id) === String(id));
  if (!r) return;
  const isFav = favorites.has(String(r.id));
  const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
  const steps = Array.isArray(r.steps) ? r.steps : [];

  const ingRows = ings.map((ing, i) => {
    const text = typeof ing === 'object' ? `${ing.amount||''} ${ing.unit||''} ${ing.name||''}`.trim() : ing;
    return `<div class="ingredient-row">
      <div class="ing-check" id="ic${i}" onclick="toggleIng(${i})"></div>
      <div class="ing-text" id="it${i}">${text}</div>
    </div>`;
  }).join('');

  const stepRows = steps.map((s, i) => {
    let text = typeof s === 'object' ? (s.text||s.description||'') : s;
    text = text.replace(/^\d+\.\s*/, '');
    return `<div class="step-row">
      <div class="step-num">${i+1}</div>
      <div class="step-text">${text}</div>
    </div>`;
  }).join('');

  const hasImage = !!r.image;

  const dv = document.getElementById('detail-view');
  dv.innerHTML = `
    ${hasImage ? `
      <div style="position:relative;">
        <img class="detail-hero" src="${r.image}" alt="${r.name||''}" onerror="this.parentElement.innerHTML=''" />
        <div class="detail-header-floating">
          <button class="back-btn" onclick="closeDetail()">‹ Takaisin</button>
          <div style="flex:1;"></div>
          <button class="fav-btn ${isFav?'active':''}" id="dfav" onclick="toggleFavDetail('${r.id}')" style="background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:50%;width:38px;height:38px;">${favSvg(isFav)}</button>
        </div>
      </div>
    ` : `
      <div class="detail-header">
        <button class="back-btn-plain" onclick="closeDetail()">‹ Takaisin</button>
        <div style="flex:1;"></div>
        <button class="fav-btn ${isFav?'active':''}" id="dfav" onclick="toggleFavDetail('${r.id}')">${favSvg(isFav)}</button>
        ${ings.length?`<button class="shop-btn" onclick="openShoppingList('${r.id}')">🛒</button>`:''}
      </div>
    `}
    <div class="detail-title-area">
      <div class="detail-title">${r.name||'Nimetön'}</div>
      ${r.category?`<div class="detail-subtitle">${r.category}</div>`:''}
    </div>
    <div class="detail-body">
      <div class="detail-meta">
        ${r.time?`<div class="meta-item"><div class="meta-label">Aika</div><div class="meta-val">${r.time}</div></div>`:''}
        ${r.servings?`<div class="meta-item"><div class="meta-label">Annokset</div><div class="meta-val">${r.servings}</div></div>`:''}
      </div>
      ${hasImage && ings.length ? `<div style="margin-bottom:16px;"><button class="shop-btn" onclick="openShoppingList('${r.id}')" style="width:100%;border-radius:12px;padding:13px;">🛒 Lisää ostoslistalle</button></div>` : ''}
      ${r.source?`<a href="${r.source}" target="_blank" class="source-link"><span style="font-size:20px;">📸</span><span>Alkuperäinen video</span></a>`:''}
      ${ings.length?`<div class="section-heading">Ainesosat</div>${ingRows}`:''}
      ${steps.length?`<div class="section-heading">Ohje</div>${stepRows}`:''}
      <div style="height:40px;"></div>
    </div>`;
  dv.style.display = 'block';
  dv.scrollTop = 0;
}

function toggleIng(i) {
  const check = document.getElementById(`ic${i}`);
  const text = document.getElementById(`it${i}`);
  const checked = check.classList.toggle('checked');
  text.classList.toggle('checked', checked);
  check.textContent = checked ? '✓' : '';
}

function toggleFavDetail(id) {
  toggleFav(id);
  const isFav = favorites.has(String(id));
  const btn = document.getElementById('dfav');
  if (btn) { btn.innerHTML = favSvg(isFav); btn.classList.toggle('active', isFav); }
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
}

function openShoppingList(id) {
  const r = recipes.find(x => String(x.id) === String(id));
  if (!r) return;
  const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
  showSheetWithItems(ings, `🛒 ${r.name}`, true);
}

function showSheetWithItems(ings, title, closeBtn) {
  const overlay = document.getElementById('shop-overlay');
  const items = ings.map((ing, i) => {
    const text = typeof ing === 'object' ? `${ing.amount||''} ${ing.unit||''} ${ing.name||''}`.trim() : ing;
    const sub = ing.recipe ? `<div style="font-size:11px;color:var(--text-secondary);">${ing.recipe}</div>` : '';
    return `<div class="shop-item">
      <div class="shop-check" id="sc${i}" onclick="toggleShop(${i})"></div>
      <div style="flex:1;"><div class="shop-text" id="st${i}">${text}</div>${sub}</div>
    </div>`;
  }).join('');

  overlay.innerHTML = `
    <div class="shop-sheet">
      ${closeBtn?`<button class="close-sheet" onclick="closeShop()">×</button>`:''}
      <div class="sheet-handle"></div>
      <div class="sheet-title">${title}</div>
      ${items || '<p style="color:var(--text-secondary);font-size:14px;text-align:center;padding:20px 0;">Ei ainesosia.</p>'}
      <p style="font-size:12px;color:var(--text-tertiary);margin-top:16px;text-align:center;">Ruksaa ainesosat kaupassa</p>
    </div>`;
  overlay.style.display = 'flex';
  overlay.onclick = e => { if (e.target === overlay) closeShop(); };
}

function toggleShop(i) {
  const check = document.getElementById(`sc${i}`);
  const text = document.getElementById(`st${i}`);
  const checked = check.classList.toggle('checked');
  text.classList.toggle('checked', checked);
  check.textContent = checked ? '✓' : '';
}

function closeShop() {
  document.getElementById('shop-overlay').style.display = 'none';
  if (activeTab === 'shopping') setTab('browse');
}

function setTab(tab) {
  activeTab = tab;
  ['browse','favorites','shopping'].forEach(t =>
    document.getElementById(`nav-${t}`)?.classList.toggle('active', t === tab));

  if (tab === 'shopping') {
    const favRecipes = recipes.filter(r => favorites.has(String(r.id)));
    const allIngs = [];
    favRecipes.forEach(r => {
      (Array.isArray(r.ingredients) ? r.ingredients : []).forEach(ing => {
        allIngs.push({ ...(typeof ing === 'object' ? ing : {name: ing}), recipe: r.name });
      });
    });
    showSheetWithItems(allIngs, '🛒 Ostoslista (suosikit)', false);
    return;
  }
  renderList();
}

init();
</script>
</body>
</html>
