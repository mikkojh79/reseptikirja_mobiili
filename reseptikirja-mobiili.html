<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Reseptikirja">
<title>Reseptikirja</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; max-width: 430px; margin: 0 auto; }
@media (prefers-color-scheme: dark) {
  body { background: #1c1c1e; color: #f2f2f7; }
  .header, .search-bar, .filter-scroll, .bottom-nav, .recipe-card, .detail-header, .detail-view { background: #2c2c2e !important; }
  .search-input { background: #3a3a3c !important; color: #f2f2f7 !important; }
  .filter-chip { background: #3a3a3c !important; color: #ebebf5cc !important; border-color: #3a3a3c !important; }
  .meta-item { background: #3a3a3c !important; }
  .card-tag { background: #3a3a3c !important; color: #ebebf5cc !important; }
  .shop-sheet { background: #2c2c2e !important; }
  .setup-input { background: #2c2c2e !important; color: #f2f2f7 !important; border-color: #3a3a3c !important; }
  .ing-check { border-color: #555 !important; }
  .shop-check { border-color: #555 !important; }
  .close-sheet { background: #3a3a3c !important; color: #ebebf5cc !important; }
  .section-heading { border-color: #3a3a3c !important; }
  .ingredient-row, .step-row, .shop-item { border-color: #3a3a3c !important; }
  .header, .search-bar, .filter-scroll, .bottom-nav { border-color: #3a3a3c !important; }
  .recipe-card { border-color: #3a3a3c !important; }
  .card-tag.cat { background: #0a3d2e !important; color: #4cd9a0 !important; }
  .setup-view { background: #1c1c1e !important; }
  .filter-chip.active { background: #1D9E75 !important; border-color: #1D9E75 !important; color: #fff !important; }
  .nav-btn { color: #636366 !important; }
  .nav-btn.active { color: #1D9E75 !important; }
  .header-btn { color: #636366 !important; }
  .section-title { color: #636366 !important; }
  .card-servings { color: #636366 !important; }
  .meta-label { color: #ebebf5cc !important; }
  .step-text { color: #f2f2f7 !important; }
  .sheet-handle { background: #636366 !important; }
  .sort-btn { background: #3a3a3c !important; color: #ebebf5cc !important; }
  .sort-btn.active { background: #0a3d2e !important; color: #4cd9a0 !important; }
}

.phone-frame { background: #f2f2f7; min-height: 100vh; display: flex; flex-direction: column; }
@media (prefers-color-scheme: dark) { .phone-frame { background: #1c1c1e !important; } }

.header { background: #fff; padding: 52px 16px 12px; border-bottom: 0.5px solid #e5e5ea; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; font-weight: 600; flex: 1; }
.header-btn { background: none; border: none; cursor: pointer; color: #8e8e93; font-size: 22px; padding: 4px; display: flex; align-items: center; }

.search-bar { background: #fff; padding: 10px 16px 12px; border-bottom: 0.5px solid #e5e5ea; display: flex; align-items: center; gap: 8px; }
.search-input { flex: 1; background: #f2f2f7; border: none; border-radius: 10px; padding: 9px 14px; font-size: 15px; color: #1c1c1e; outline: none; }
.search-input::placeholder { color: #8e8e93; }

.sort-btn { background: #f2f2f7; border: none; border-radius: 10px; padding: 9px 12px; font-size: 13px; color: #8e8e93; cursor: pointer; white-space: nowraw; flex-shrink: 0; font-weight: 500; transition: background 0.15s, color 0.15s; }
.sort-btn.active { background: #e1f5ee; color: #1D9E75; }

.filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px; background: #fff; border-bottom: 0.5px solid #e5e5ea; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip { background: #f2f2f7; border: 0.5px solid #e5e5ea; border-radius: 20px; padding: 5px 14px; font-size: 13px; white-space: nowrap; cursor: pointer; color: #8e8e93; flex-shrink: 0; }
.filter-chip.active { background: #1D9E75; border-color: #1D9E75; color: #fff; font-weight: 500; }

.content { flex: 1; overflow-y: auto; padding: 12px 16px; }

.recipe-card { background: #fff; border-radius: 12px; border: 0.5px solid #e5e5ea; margin-bottom: 10px; padding: 14px 16px; cursor: pointer; transition: transform 0.1s; }
.recipe-card:active { transform: scale(0.98); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-name { font-size: 16px; font-weight: 600; line-height: 1.3; flex: 1; }
.card-time { font-size: 13px; color: #8e8e93; white-space: nowrap; }
.card-meta { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.card-tag { font-size: 11px; background: #f2f2f7; border-radius: 6px; padding: 2px 8px; color: #8e8e93; }
.card-tag.cat { background: #e1f5ee; color: #0F6E56; }
.card-servings { font-size: 12px; color: #8e8e93; margin-top: 4px; }

.empty-state { text-align: center; padding: 40px 20px; color: #8e8e93; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: #1c1c1e; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: #8e8e93; font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 2px solid #e5e5ea; border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.bottom-nav { background: #fff; border-top: 0.5px solid #e5e5ea; display: flex; padding: 8px 0 28px; position: sticky; bottom: 0; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px; cursor: pointer; border: none; background: none; font-size: 10px; color: #8e8e93; }
.nav-btn.active { color: #1D9E75; }
.nav-icon { font-size: 22px; }

.detail-view { position: fixed; inset: 0; background: #f2f2f7; z-index: 200; overflow-y: auto; max-width: 430px; margin: 0 auto; }
@media (prefers-color-scheme: dark) { .detail-view { background: #1c1c1e !important; } }
.detail-header { display: flex; align-items: center; gap: 12px; padding: 52px 16px 16px; border-bottom: 0.5px solid #e5e5ea; background: #fff; }
.back-btn { background: none; border: none; font-size: 17px; cursor: pointer; color: #1D9E75; padding: 4px; font-weight: 500; }
.detail-title { font-size: 17px; font-weight: 600; flex: 1; line-height: 1.2; }
.shop-btn { background: #1D9E75; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer; font-weight: 500; flex-shrink: 0; }

.detail-body { padding: 16px; }
.detail-meta { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.meta-item { display: flex; flex-direction: column; align-items: center; background: #f2f2f7; border-radius: 10px; padding: 10px 16px; flex: 1; min-width: 70px; }
.meta-label { font-size: 11px; color: #8e8e93; margin-bottom: 2px; }
.meta-val { font-size: 17px; font-weight: 600; }

.section-heading { font-size: 15px; font-weight: 600; margin-bottom: 10px; margin-top: 20px; padding-bottom: 6px; border-bottom: 0.5px solid #e5e5ea; }

.ingredient-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid #e5e5ea; }
.ing-check { width: 22px; height: 22px; border: 1.5px solid #c7c7cc; border-radius: 6px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.ing-check.checked { background: #1D9E75; border-color: #1D9E75; color: #fff; font-size: 13px; }
.ing-text { font-size: 15px; flex: 1; }
.ing-text.checked { text-decoration: line-through; color: #8e8e93; }

.step-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 0.5px solid #e5e5ea; }
.step-num { width: 26px; height: 26px; background: #1D9E75; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
.step-text { font-size: 15px; line-height: 1.5; flex: 1; }

.shop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; flex-direction: column; justify-content: flex-end; max-width: 430px; margin: 0 auto; }
.shop-sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 48px; max-height: 80vh; overflow-y: auto; position: relative; }
.sheet-handle { width: 36px; height: 4px; background: #c7c7cc; border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.shop-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid #e5e5ea; }
.shop-check { width: 24px; height: 24px; border: 1.5px solid #c7c7cc; border-radius: 12px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.shop-check.checked { background: #1D9E75; border-color: #1D9E75; color: #fff; font-size: 14px; }
.shop-text { font-size: 15px; flex: 1; }
.shop-text.checked { text-decoration: line-through; color: #8e8e93; }
.close-sheet { position: absolute; top: 20px; right: 20px; background: #f2f2f7; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: #8e8e93; display: flex; align-items: center; justify-content: center; }

.setup-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 32px 24px; text-align: center; gap: 16px; background: #f2f2f7; }
.setup-icon { font-size: 56px; }
.setup-title { font-size: 22px; font-weight: 700; }
.setup-desc { font-size: 14px; color: #8e8e93; line-height: 1.6; }
.setup-input { width: 100%; border: 0.5px solid #c7c7cc; border-radius: 10px; padding: 13px 14px; font-size: 14px; background: #fff; color: #1c1c1e; outline: none; }
.setup-input:focus { border-color: #1D9E75; }
.setup-btn { background: #1D9E75; color: #fff; border: none; border-radius: 12px; padding: 14px 28px; font-size: 17px; font-weight: 600; cursor: pointer; width: 100%; }
.error-msg { font-size: 13px; color: #ff3b30; }

.fav-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px; }
.fav-btn.active { color: #ff9500; }
.fav-btn:not(.active) { color: #c7c7cc; }

.favorites-empty { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div class="phone-frame" id="app">

<div class="header">
  <button id="setup-back-btn" onclick="closeSetup()" style="display:none;background:none;border:none;font-size:17px;color:#1D9E75;font-weight:500;cursor:pointer;padding:4px;">‹ Takaisin</button>
  <span id="header-icon" style="font-size:24px;">🍽️</span>
  <h1 id="header-title">Reseptikirja</h1>
  <button class="header-btn" onclick="loadRecipes()" title="Päivitä">↻</button>
  <button class="header-btn" onclick="showSetup()" title="Asetukset">⚙</button>
</div>

<div id="main-content">
  <div class="setup-view" id="setup-view" style="display:none;">
    <div class="setup-icon">🔗</div>
    <div class="setup-title">Yhdistä reseptikirja</div>
    <div class="setup-desc">Liitä Google Sheets Apps Script -osoitteesi alle. Löydät sen alkuperäisestä reseptisovelluksesta.</div>
    <input class="setup-input" id="api-url-input" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
    <div class="error-msg" id="setup-error" style="display:none;"></div>
    <button class="setup-btn" onclick="saveApiUrl()">Yhdistä</button>
  </div>

  <div id="browse-view">
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="🔍  Hae reseptiä..." oninput="renderList()" />
      <button class="sort-btn" id="sort-btn" onclick="toggleSort()" title="Vaihda järjestys">A–Z</button>
    </div>
    <div class="filter-scroll" id="filter-chips"></div>
    <div class="content" id="recipe-list"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nav-browse" onclick="setTab('browse')">
    <span class="nav-icon">📋</span>Reseptit
  </button>
  <button class="nav-btn" id="nav-favorites" onclick="setTab('favorites')">
    <span class="nav-icon">⭐</span>Suosikit
  </button>
  <button class="nav-btn" id="nav-shopping" onclick="setTab('shopping')">
    <span class="nav-icon">🛒</span>Ostoslista
  </button>
</div>
</div>

<div class="detail-view" id="detail-view" style="display:none;"></div>
<div class="shop-overlay" id="shop-overlay" style="display:none;"></div>

<script>
let recipes = [];
let favorites = new Set(JSON.parse(localStorage.getItem('rk_favs') || '[]'));
let activeCategory = 'all';
let activeTab = 'browse';
let apiUrl = localStorage.getItem('rk_api_url') || '';
let sortOrder = localStorage.getItem('rk_sort') || 'alpha';

function init() {
  if (!apiUrl) { showSetup(); return; }
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('browse-view').style.display = 'block';
  updateSortBtn();
  const cached = localStorage.getItem('rk_recipes');
  if (cached) {
    recipes = JSON.parse(cached);
    renderFilters();
    renderList();
  } else {
    loadRecipes();
  }
}


function updateSortBtn() {
  const btn = document.getElementById('sort-btn');
  if (!btn) return;
  if (sortOrder === 'alpha') {
    btn.textContent = 'A\u2013Z';
    btn.classList.remove('active');
  } else {
    btn.textContent = 'Uusin';
    btn.classList.add('active');
  }
}

function toggleSort() {
  sortOrder = sortOrder === 'alpha' ? 'newest' : 'alpha';
  localStorage.setItem('rk_sort', sortOrder);
  updateSortBtn();
  renderList();
}

function closeSetup() {
  if (!apiUrl) return;
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('browse-view').style.display = 'block';
  document.getElementById('header-title').textContent = 'Reseptikirja';
  document.querySelector('.bottom-nav').style.visibility = 'visible';
  document.getElementById('setup-back-btn').style.display = 'none';
  document.getElementById('header-icon').style.display = 'block';
}

function showSetup() {
  document.getElementById('setup-view').style.display = 'flex';
  document.getElementById('browse-view').style.display = 'none';
  document.getElementById('api-url-input').value = apiUrl;
  document.getElementById('setup-error').style.display = 'none';
  document.getElementById('header-title').textContent = 'Asetukset';
  document.querySelector('.bottom-nav').style.visibility = 'hidden';
  const backBtn = document.getElementById('setup-back-btn');
  const headerIcon = document.getElementById('header-icon');
  if (backBtn) backBtn.style.display = apiUrl ? 'block' : 'none';
  if (headerIcon) headerIcon.style.display = apiUrl ? 'none' : 'block';
}

function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim();
  if (!val.startsWith('https://')) {
    document.getElementById('setup-error').textContent = 'Tarkista URL-osoite.';
    document.getElementById('setup-error').style.display = 'block';
    return;
  }
  apiUrl = val;
  localStorage.setItem('rk_api_url', apiUrl);
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('browse-view').style.display = 'block';
  document.getElementById('header-title').textContent = 'Reseptikirja';
  document.querySelector('.bottom-nav').style.visibility = 'visible';
  loadRecipes();
}

async function loadRecipes() {
  document.getElementById('recipe-list').innerHTML = '<div class="loading"><div class="spinner"></div>Ladataan reseptejä...</div>';
  document.getElementById('filter-chips').innerHTML = '';
  try {
    const res = await fetch(apiUrl);
    const data = await res.json();
    recipes = (Array.isArray(data) ? data : []).map(r => ({
      ...r,
      ingredients: parse(r.ingredients, []),
      steps: parse(r.steps, []),
      tags: parse(r.tags, []),
    }));
    localStorage.setItem('rk_recipes', JSON.stringify(recipes));
    renderFilters();
    renderList();
  } catch(e) {
    document.getElementById('recipe-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Yhteysvirhe</div><p style="font-size:13px;color:#8e8e93;margin-top:6px;">Tarkista API-osoite asetuksista.</p></div>';
  }
}

function parse(val, def) {
  if (!val) return def;
  if (typeof val === 'object') return val;
  try { return JSON.parse(val); } catch(e) {}
  if (def && Array.isArray(def)) {
    const text = String(val).trim();
    if (!text) return def;
    const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
    if (lines.length > 1) return lines.map(l => ({ name: l, text: l }));
    const numbered = text.split(/(?=\d+\.\s)/).map(s => s.trim()).filter(Boolean);
    if (numbered.length > 1) return numbered.map(s => ({ text: s.replace(/^\d+\.\s*/, ''), name: s.replace(/^\d+\.\s*/, '') }));
    const parts = text.split(/(?=\d+\.?\d*\s*(g|kg|ml|l|dl|kpl|large|small|medium|tbsp|tsp|cup)\b)/i).map(s => s.trim()).filter(Boolean);
    if (parts.length > 1) return parts.map(p => ({ name: p, text: p }));
    return [{ name: text, text: text }];
  }
  return def;
}

function renderFilters() {
  const cats = [...new Set(recipes.map(r => r.category).filter(Boolean))].sort();
  document.getElementById('filter-chips').innerHTML =
    `<div class="filter-chip active" data-cat="all" onclick="setCat('all')">Kaikki</div>` +
    cats.map(c => `<div class="filter-chip" data-cat="${c}" onclick="setCat('${c}')">${c}</div>`).join('');
}

function setCat(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-chip').forEach(el =>
    el.classList.toggle('active', el.dataset.cat === cat));
  renderList();
}

function getFiltered() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  let list = activeTab === 'favorites' ? recipes.filter(r => favorites.has(String(r.id))) : recipes;
  if (activeCategory !== 'all') list = list.filter(r => r.category === activeCategory);
  if (q) list = list.filter(r =>
    (r.name||'').toLowerCase().includes(q) ||
    (Array.isArray(r.ingredients) ? r.ingredients.map(i=>i.name||i).join(' ') : '').toLowerCase().includes(q) ||
    (r.category||'').toLowerCase().includes(q) ||
    (Array.isArray(r.tags) ? r.tags.join(' ') : '').toLowerCase().includes(q)
  );
  if (sortOrder === 'alpha') {
    list = [...list].sort((a, b) => (a.name||'').localeCompare(b.name||'', 'fi'));
  } else {
    list = [...list].sort((a, b) => Number(b.id) - Number(a.id));
  }
  return list;
}

function renderList() {
  const list = getFiltered();
  const el = document.getElementById('recipe-list');
  if (!list.length) {
    if (activeTab === 'favorites' && !recipes.filter(r=>favorites.has(String(r.id))).length) {
      el.innerHTML = '<div class="favorites-empty">Ei suosikkeja vielä.<br><br>Avaa resepti ja napauta ☆ lisätäksesi suosikkeihin.</div>';
    } else {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Ei tuloksia</div></div>';
    }
    return;
  }
  el.innerHTML = list.map(r => {
    const isFav = favorites.has(String(r.id));
    const tags = Array.isArray(r.tags) ? r.tags.slice(0,2).map(t=>`<span class="card-tag">${t}</span>`).join('') : '';
    return `<div class="recipe-card" onclick="openDetail('${r.id}')">
      ${r.image?`<img src="${r.image}" alt="${r.name||''}" style="width:100%;height:160px;object-fit:cover;border-radius:10px 10px 0 0;margin:-14px -16px 12px;width:calc(100% + 32px);" onerrorr="this.style.display='none'" />`:''}
      <div class="card-header">
        <div class="card-name">${r.name||'Nimetön'}</div>
        <button class="fav-btn ${isFav?'active':''}" onclick="event.stopPropagation();toggleFav('${r.id}')">${isFav?'⭐':'☆'}</button>
      </div>
      <div class="card-meta">
        ${r.category?`<span class="card-tag cat">${r.category}</span>`:''}
        ${r.time?`<span class="card-time" style="font-size:13px;color:#8e8e93;">⏱ ${r.time}</span>`:''}
        ${tags}
      </div>
      ${r.servings?`<div class="card-servings">${r.servings} annosta</div>`:''}
    </div>`;
  }).join('');
}

function toggleFav(id) {
  const key = String(id);
  if (favorites.has(key)) favorites.delete(key); else favorites.add(key);
  localStorage.setItem('rk_favs', JSON.stringify([...favorites]));
  renderList();
}

function openDetail(id) {
  const r = recipes.find(x => String(x.id) === String(id));
  if (!r) return;
  const isFav = favorites.has(String(r.id));
  const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
  const steps = Array.isArray(r.steps) ? r.steps : [];

  const ingRows = ings.map((ing, i) => {
    const text = typeof ing === 'object' ? `${ing.amount||''} ${ing.unit||''} ${ing.name||''}`.trim() : ing;
    return `<div class="ingredient-row">
      <div class="ing-check" id="ic${i}" onclick="toggleIng(${i})"></div>
      <div class="ing-text" id="it${i}">${text}</div>
    </div>`;
  }).join('');

  const stepRows = steps.map((s, i) => {
    let text = typeof s === 'object' ? (s.text||s.description||'') : s;
    text = text.replace(/^\d+\.\s*/, '');
    return `<div class="step-row">
      <div class="step-num">${i+1}</div>
      <div class="step-text">${text}</div>
    </div>`;
  }).join('');

  const dv = document.getElementById('detail-view');
  dv.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">‹ Takaisin</button>
      <div class="detail-title">${r.name||'Nimetön'}</div>
      <button class="fav-btn ${isFav?'active':''}" id="dfav" onclick="toggleFavDetail('${r.id}')">${isFav?'⭐':'☆'}</button>
      ${ings.length?`<button class="shop-btn" onclick="openShoppingList('${r.id}')">🛒</button>`:''}
    </div>
    <div class="detail-body">
      ${r.image?`<img src="${r.image}" alt="${r.name||''}" style="width:calc(100% + 32px);margin:-16px -16px 16px;height:220px;object-fit:cover;display:block;" onerror="this.style.display='none'" />`:''}
      <div class="detail-meta">
        ${r.time?`<div class="meta-item"><div class="meta-label">Aika</div><div class="meta-val">${r.time}</div></div>`:''}
        ${r.servings?`<div class="meta-item"><div class="meta-label">Annokset</div><div class="meta-val">${r.servings}</div></div>`:''}
        ${r.category?`<div class="meta-item"><div class="meta-label">Kategoria</div><div class="meta-val" style="font-size:13px;">${r.category}</div></div>`:''}
      </div>
      ${r.source?`<a href="${r.source}" target="_blank" style="display:flex;align-items:center;gap:8px;background:#f2f2f7;border-radius:10px;padding:10px 14px;margin-bottom:16px;text-decoration:none;color:#1c1c1e;font-size:14px;"><span style="font-size:20px;">📸</span><span style="color:#1D9E75;font-weight:500;">Alkuperäinen video</span></a>`:''}
     ${ings.length?`<div class="section-heading">Ainesosat</div>${ingRows}`:''}
      ${steps.length?`<div class="section-heading">Ohje</div>${stepRows}`:''}
      <div style="height:40px;"></div>
    </div>`;
  dv.style.display = 'block';
  dv.scrollTop = 0;
}

function toggleIng(i) {
  const check = document.getElementById(`ic${i}`);
  const text = document.getElementById(`it${i}`);
  const checked = check.classList.toggle('checked');
  text.classList.toggle('checked', checked);
  check.textContent = checked ? '✓' : '';
}

function toggleFavDetail(id) {
  toggleFav(id);
  const isFav = favorites.has(String(id));
  const btn = document.getElementById('dfav');
  if (btn) { btn.textContent = isFav?'⭐':'☆'; btn.classList.toggle('active', isFav); }
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
}

function openShoppingList(id) {
  const r = recipes.find(x => String(x.id) === String(id));
  if (!r) return;
  const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
  showSheetWithItems(ings, `🛒 ${r.name}`, true);
}

function showSheetWithItems(ings, title, closeBtn) {
  const overlay = document.getElementById('shop-overlay');
  const items = ings.map((ing, i) => {
    const text = typeof ing === 'object' ? `${ing.amount||''} ${ing.unit||''} ${ing.name||''}`.trim() : ing;
    const sub = ing.recipe ? `<div style="font-size:11px;color:#8e8e93;">${ing.recipe}</div>` : '';
    return `<div class="shop-item">
      <div class="shop-check" id="sc${i}" onclick="toggleShop(${i})"></div>
      <div style="flex:1;"><div class="shop-text" id="st${i}">${text}</div>${sub}</div>
    </div>`;
  }).join('');

  overlay.innerHTML = `
    <div class="shop-sheet">
      ${closeBtn?`<button class="close-sheet" onclick="closeShop()">×</button>`:''}
      <div class="sheet-handle"></div>
      <div class="sheet-title">${title}</div>
      ${items || '<p style="color:#8e8e93;font-size:14px;text-align:center;padding:20px 0;">Ei ainesosia.</p>'}
      <p style="font-size:12px;color:#8e8e93;margin-top:16px;text-align:center;">Ruksaa ainesosat kaupassa</p>
    </div>`;
  overlay.style.display = 'flex';
  overlay.onclick = e => { if (e.target === overlay) closeShop(); };
}

function toggleShop(i) {
  const check = document.getElementById(`sc${i}`);
  const text = document.getElementById(`st${i}`);
  const checked = check.classList.toggle('checked');
  text.classList.toggle('checked', checked);
  check.textContent = checked ? '✓' : '';
}

function closeShop() {
  document.getElementById('shop-overlay').style.display = 'none';
  if (activeTab === 'shopping') setTab('browse');
}

function setTab(tab) {
  activeTab = tab;
  ['browse','favorites','shopping'].forEach(t =>
    document.getElementById(`nav-${t}`)?.classList.toggle('active', t === tab));

  if (tab === 'shopping') {
    const favRecipes = recipes.filter(r => favorites.has(String(r.id)));
    const allIngs = [];
    favRecipes.forEach(r => {
      (Array.isArray(r.ingredients) ? r.ingredients : []).forEach(ing => {
        allIngs.push({ ...(typeof ing === 'object' ? ing : {name: ing}), recipe: r.name });
      });
    });
    showSheetWithItems(allIngs, '🛒 Ostoslista (suosikit)', false);
    return;
  }
  renderList();
}

init();
</script>
</body>
</html>
